<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaic</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
// Lấy cell_size từ URL
const params = new URLSearchParams(window.location.search);
let cellSize = parseInt(params.get("cell_size"));

// Nếu không hợp lệ thì dùng mặc định 50
if (!cellSize || cellSize <= 0) {
    cellSize = 50;
}

// Load ảnh
const img = new Image();
img.crossOrigin = "anonymous";
img.src = "original.jpg";

img.onload = function () {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // Giữ nguyên kích thước ảnh gốc
    canvas.width = img.width;
    canvas.height = img.height;

    // Vẽ ảnh gốc
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    // Tạo mosaic
    for (let y = 0; y < canvas.height; y += cellSize) {
        for (let x = 0; x < canvas.width; x += cellSize) {

            let r = 0, g = 0, b = 0, count = 0;

            for (let yy = y; yy < y + cellSize && yy < canvas.height; yy++) {
                for (let xx = x; xx < x + cellSize && xx < canvas.width; xx++) {
                    const index = (yy * canvas.width + xx) * 4;
                    r += data[index];
                    g += data[index + 1];
                    b += data[index + 2];
                    count++;
                }
            }

            r = Math.floor(r / count);
            g = Math.floor(g / count);
            b = Math.floor(b / count);

            ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
            ctx.fillRect(x, y, cellSize, cellSize);
        }
    }
};
</script>

</body>
</html>
